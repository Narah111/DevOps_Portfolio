name: Deploy Bug Tracker

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    name: Deploy Terraform Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}  # ← du lägger till detta i GitHub senare
          aws-region: eu-north-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Terraform Init
        working-directory: terraform
        run: tofu init

      - name: Terraform Apply
        working-directory: terraform
        run: tofu apply -auto-approve -var="github_username=${{ secrets.GH_USERNAME }}"  # ← du lägger till detta i GitHub senare

  deploy-frontend:
    name: Build and Deploy React Frontend
    runs-on: ubuntu-latest
    needs: deploy-infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1

      - name: Terraform Init
        working-directory: terraform
        run: tofu init

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Upload frontend to S3
        working-directory: terraform
        run: |
          BUCKET_NAME=$(tofu output -raw frontend_bucket_name)
          aws s3 sync ../frontend/dist s3://$BUCKET_NAME --delete

      - name: Invalidate CloudFront cache
        working-directory: terraform
        run: |
          DISTRIBUTION_ID=$(tofu output -raw cloudfront_distribution_id)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"